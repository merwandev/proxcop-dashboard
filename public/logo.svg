<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer lavender ring -->
  <circle cx="100" cy="100" r="100" fill="#C0C6E6"/>
  <!-- Inner dark circle -->
  <circle cx="100" cy="100" r="84" fill="#3B3D4F"/>

  <!-- P shape - built as outlined/double-stroke circuit style -->
  <defs>
    <!-- The P path as a single centerline for the outer shape -->
    <path id="p-outer"
      d="M 72 150
         L 72 78
         C 72 62, 84 50, 100 50
         L 112 50
         C 132 50, 146 64, 146 82
         C 146 100, 132 114, 112 114
         L 92 114
         L 92 104"
    />
    <path id="p-inner"
      d="M 82 140
         L 82 78
         C 82 68, 90 60, 100 60
         L 108 60
         C 122 60, 132 70, 132 82
         C 132 94, 122 104, 108 104
         L 92 104"
    />
  </defs>

  <!-- Outer P outline (lavender thick stroke, round caps) -->
  <use href="#p-outer" fill="none" stroke="#C0C6E6" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dark fill to create outline effect -->
  <use href="#p-outer" fill="none" stroke="#3B3D4F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner P line (thinner lavender) -->
  <use href="#p-inner" fill="none" stroke="#C0C6E6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dark center of inner line -->
  <use href="#p-inner" fill="none" stroke="#3B3D4F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Circuit nodes (dots at endpoints) -->
  <!-- Top-left node -->
  <circle cx="72" cy="50" r="6" fill="#C0C6E6"/>
  <circle cx="72" cy="50" r="2.5" fill="#3B3D4F"/>
  <!-- Bottom node -->
  <circle cx="72" cy="150" r="6" fill="#C0C6E6"/>
  <circle cx="72" cy="150" r="2.5" fill="#3B3D4F"/>
  <!-- Junction node (where horizontal meets vertical on inner) -->
  <circle cx="92" cy="104" r="5" fill="#C0C6E6"/>
  <circle cx="92" cy="104" r="2" fill="#3B3D4F"/>
</svg>
