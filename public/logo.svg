<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer circle - lavender ring -->
  <circle cx="100" cy="100" r="98" fill="#C9CEEE"/>
  <!-- Inner circle - dark background -->
  <circle cx="100" cy="100" r="84" fill="#2A2B35"/>
  <!-- Circuit-style P -->
  <g stroke="#C9CEEE" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Main P shape - outer stroke -->
    <path d="M76 150V72c0-4.4 3.6-8 8-8h24c17.7 0 32 14.3 32 32s-14.3 32-32 32H86" stroke-width="10"/>
    <!-- Inner stroke for circuit double-line effect -->
    <path d="M80 144V76c0-2.2 1.8-4 4-4h20c13.3 0 24 10.7 24 24s-10.7 24-24 24H86" stroke-width="3"/>
    <!-- Circuit node dots -->
    <circle cx="76" cy="64" r="5" fill="#C9CEEE" stroke="none"/>
    <circle cx="140" cy="96" r="4" fill="#C9CEEE" stroke="none"/>
    <circle cx="76" cy="150" r="5" fill="#C9CEEE" stroke="none"/>
    <!-- Circuit branch lines -->
    <line x1="140" y1="96" x2="152" y2="96" stroke-width="3"/>
    <circle cx="152" cy="96" r="3" fill="#C9CEEE" stroke="none"/>
    <line x1="86" y1="128" x2="86" y2="136" stroke-width="3"/>
  </g>
</svg>
